<!DOCTYPE html>
<html>
<head>
<title>System Settings</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#f4f6f9; padding:40px;">

<div class="container">

<h2 class="mb-4">System Settings</h2>

<form method="POST">

<div class="card p-4 mb-4">

<h5>Parking Capacity</h5>

<label>Downtown Garage Capacity</label>
<input type="number" name="downtown" class="form-control mb-3" value="{{ downtown }}">

<label>Airport Parking Capacity</label>
<input type="number" name="airport" class="form-control">

</div>

<div class="card p-4 mb-4">

<h5>Parking Prices</h5>

<label>2 Wheeler Price</label>
<input type="number" name="price_2" class="form-control mb-3" value="{{ price2 }}">

<label>4 Wheeler Price</label>
<input type="number" name="price_4" class="form-control mb-3" value="{{ price4 }}">

<label>VIP Extra Charge</label>
<input type="number" name="vip_extra" class="form-control" value="{{ vip }}">

</div>

<button class="btn btn-primary">Save Settings</button>
<a href="/" class="btn btn-secondary">Back</a>

</form>

</div>

</body>
</html>
